<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Worm - V-Pet</title>
    <link rel="stylesheet" href="src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div class="vpet-container">
        <div class="gameboy-body">
            <div class="gameboy-screen-bezel">
                <!-- Inner Screen -->
                <div class="vpet-screen" id="vpet-screen">
                    <!-- Status Bars -->
                    <div class="stats-container">
                        <div class="stat-item">
                            <span class="stat-label">ALIMENTAÇÃO</span>
                            <div class="progress-bar-bg">
                                <div id="hunger-bar" class="progress-bar hunger" style="width: 100%;"></div>
                            </div>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">FELICIDADE</span>
                            <div class="progress-bar-bg">
                                <div id="happiness-bar" class="progress-bar happiness" style="width: 100%;"></div>
                            </div>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">VIDA</span>
                            <div class="progress-bar-bg">
                                <div id="health-bar" class="progress-bar health" style="width: 100%;"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Game Area -->
                    <div class="game-area" id="game-area">
                        <div id="pet-container" class="pet-container">
                            <div id="pet" class="pet-sprite"></div>
                        </div>
                        <div id="click-feedback" class="click-feedback hidden">+2%</div>
                    </div>

                    <!-- Evolution Progress Overlay -->
                    <div id="evo-timer-display" class="evo-timer">EVO: 0s</div>
                </div>
            </div>

            <div class="gameboy-controls">
                <div class="controls-left">
                    <!-- Digivice round button style -->
                    <div class="btn-group">
                        <button id="btn-restart" class="digivice-btn btn-round" title="Reiniciar"></button>
                        <span class="btn-label">REINICIAR</span>
                    </div>
                </div>
                <div class="controls-right">
                    <!-- Digivice pill buttons style -->
                    <div class="btn-group">
                        <span class="btn-label">ALIMENTAR</span>
                        <button id="btn-feed" class="digivice-btn btn-pill btn-pill-top" title="Alimentar"></button>
                    </div>
                    <div class="btn-group">
                        <span class="btn-label">CARINHO</span>
                        <button id="btn-pet" class="digivice-btn btn-pill btn-pill-bottom" title="Carinho"></button>
                    </div>
                </div>
            </div>
            
            <!-- Message Area below buttons -->
            <div id="notification" class="notification hidden"></div>
        </div>
    </div>


    <!-- Background Music -->
    <audio id="bg-music" src="assets/audio/BF - Digimon OST.mp3" loop></audio>

    <script src="src/script.js"></script>
</body>
</html>
